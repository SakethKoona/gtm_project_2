services:
  postgres:
    image: postgres:17-alpine
    container_name: sales_automation_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
      POSTGRES_DB: sales_automation
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d sales_automation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
